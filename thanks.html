<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3lleven — Message received</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    font-family: 'DM Mono', 'Courier New', monospace;
    color: #d0d0d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 32px;
    text-align: center;
  }

  .wordmark {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .wordmark span { color: #ff4d00; }

  .check {
    width: 52px;
    height: 52px;
    border: 1px solid #1a1a1a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heading {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  .sub {
    font-size: 12px;
    color: #444;
    line-height: 1.7;
    max-width: 320px;
  }

  .back {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 10px 20px;
    transition: border-color 0.15s, color 0.15s;
  }

  .back:hover {
    border-color: #ff4d00;
    color: #ff4d00;
  }
</style>
</head>
<body>

<div class="wordmark">3<span>lleven</span></div>

<div class="check">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <path d="M4 10.5L8 14.5L16 6.5" stroke="#ff4d00" stroke-width="1.5" stroke-linecap="square"/>
  </svg>
</div>

<h1 class="heading">Message received.</h1>

<p class="sub">I'll be in touch within 24 hours.</p>

<a href="https://3lleven.dev" class="back">← back to 3lleven</a>

</body>
</html>
